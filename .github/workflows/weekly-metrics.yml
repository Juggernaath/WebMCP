name: Weekly Metrics

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 AM UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub stats
        id: github
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATS=$(gh api repos/${{ github.repository }})
          echo "stars=$(echo "$STATS" | jq '.stargazers_count')" >> "$GITHUB_OUTPUT"
          echo "forks=$(echo "$STATS" | jq '.forks_count')" >> "$GITHUB_OUTPUT"
          echo "open_issues=$(echo "$STATS" | jq '.open_issues_count')" >> "$GITHUB_OUTPUT"

      - name: Fetch npm stats
        id: npm
        run: |
          WEEKLY=$(curl -s "https://api.npmjs.org/downloads/point/last-week/webagent-mcp" | jq '.downloads // 0')
          MONTHLY=$(curl -s "https://api.npmjs.org/downloads/point/last-month/webagent-mcp" | jq '.downloads // 0')
          echo "weekly=$WEEKLY" >> "$GITHUB_OUTPUT"
          echo "monthly=$MONTHLY" >> "$GITHUB_OUTPUT"

      - name: Update metrics.json
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ENTRY=$(jq -n \
            --arg date "$DATE" \
            --argjson stars "${{ steps.github.outputs.stars }}" \
            --argjson forks "${{ steps.github.outputs.forks }}" \
            --argjson issues "${{ steps.github.outputs.open_issues }}" \
            --argjson npm_weekly "${{ steps.npm.outputs.weekly }}" \
            --argjson npm_monthly "${{ steps.npm.outputs.monthly }}" \
            '{
              date: $date,
              github_stars: $stars,
              github_forks: $forks,
              open_issues: $issues,
              npm_weekly_downloads: $npm_weekly,
              npm_monthly_downloads: $npm_monthly
            }')

          # Append to snapshots array
          jq --argjson entry "$ENTRY" '.snapshots += [$entry]' marketing/metrics.json > tmp.json
          mv tmp.json marketing/metrics.json

      - name: Calculate growth
        id: growth
        run: |
          PREV_STARS=$(jq '.snapshots[-2].github_stars // 0' marketing/metrics.json)
          CURR_STARS=$(jq '.snapshots[-1].github_stars' marketing/metrics.json)
          PREV_NPM=$(jq '.snapshots[-2].npm_weekly_downloads // 0' marketing/metrics.json)
          CURR_NPM=$(jq '.snapshots[-1].npm_weekly_downloads' marketing/metrics.json)

          if [ "$PREV_STARS" -gt 0 ]; then
            STAR_GROWTH=$(echo "scale=1; ($CURR_STARS - $PREV_STARS) * 100 / $PREV_STARS" | bc)
          else
            STAR_GROWTH="N/A"
          fi

          if [ "$PREV_NPM" -gt 0 ]; then
            NPM_GROWTH=$(echo "scale=1; ($CURR_NPM - $PREV_NPM) * 100 / $PREV_NPM" | bc)
          else
            NPM_GROWTH="N/A"
          fi

          echo "star_growth=$STAR_GROWTH" >> "$GITHUB_OUTPUT"
          echo "npm_growth=$NPM_GROWTH" >> "$GITHUB_OUTPUT"

      - name: Create metrics issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "Weekly Metrics: $DATE" \
            --label "metrics" \
            --body "## Weekly Metrics — $DATE

          | Metric | Value | WoW Growth |
          |--------|-------|------------|
          | GitHub Stars | ${{ steps.github.outputs.stars }} | ${{ steps.growth.outputs.star_growth }}% |
          | GitHub Forks | ${{ steps.github.outputs.forks }} | — |
          | Open Issues | ${{ steps.github.outputs.open_issues }} | — |
          | npm Weekly Downloads | ${{ steps.npm.outputs.weekly }} | ${{ steps.growth.outputs.npm_growth }}% |
          | npm Monthly Downloads | ${{ steps.npm.outputs.monthly }} | — |

          *Auto-generated by [weekly-metrics.yml](../../.github/workflows/weekly-metrics.yml)*"

      - name: Commit metrics update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/metrics.json
          git diff --staged --quiet || git commit -m "chore: update weekly metrics $(date -u +%Y-%m-%d)"
          git push
